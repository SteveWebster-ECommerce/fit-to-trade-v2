<div id="root"></div>
<script type="text/babel">

const CLUSTERS = [
  {
    id: 1,
    name: "Strategic Delusion",
    premise: "Businesses that don't know what they are, or compete where they cannot win.",
    color: "#2a5c9e",
    items: [
      "We do not have a clear, defensible reason why a customer should choose us over every available alternative at full price.",
      "We prioritise revenue growth over profit contribution and margin health.",
      "Brand and performance marketing operate as separate agendas without a unified commercial strategy.",
      "We lack the agility to trial new ideas quickly, learn from them, and adjust course.",
      "We compete directly with Amazon on price and range rather than doing what Amazon cannot or will not do.",
      "We are not actively serving or pursuing international demand that exists for our products.",
      "We make assumptions about who our customers are rather than testing and verifying them.",
      "We treat our product as our proposition, even where the product itself is a commodity — making margin defence structurally impossible without brand investment."
    ]
  },
  {
    id: 2,
    name: "Operational Immaturity",
    premise: "Businesses that invest externally before they are internally ready.",
    color: "#2d7a4a",
    items: [
      "We have invested in platform or technology before the operations beneath it are ready to support it.",
      "Basic retail processes — order management, stock accuracy, despatch, returns — fail at the point of execution.",
      "We do not have a single, accurate view of inventory across all channels in real time.",
      "Our data standards and architecture were designed for manufacturing or physical retail, not distance selling.",
      "Our marketing activity and on-site experience are planned and executed independently rather than as a unified programme.",
      "Site speed is treated as a technical consideration rather than a direct commercial lever."
    ]
  },
  {
    id: 3,
    name: "Commercial Misallocation",
    premise: "Businesses that spend money in the wrong places for the wrong reasons.",
    color: "#b54a1a",
    items: [
      "Our investment in customer acquisition is disproportionate relative to our investment in retention and repeat purchase, inflating cost-to-serve and exposing the business to churn.",
      "We apply discounts as a default trading tool rather than a deliberate strategic decision, eroding margin and conditioning customers to wait for promotion rather than buy at full price.",
      "Cash flow is managed as a finance function rather than a live trading discipline that informs day-to-day decisions.",
      "We offer free returns where free exchanges would better protect margin and reduce reverse logistics cost.",
      "Returns are managed as a customer service function rather than a commercial lever, leaving significant margin recovery and revenue retention opportunities unaddressed."
    ]
  },
  {
    id: 4,
    name: "Customer Blindness",
    premise: "Businesses that have lost genuine understanding of who they are serving.",
    color: "#7a2d8f",
    items: [
      "We do not regularly act as our own customer — completing purchases on our own site without using insider knowledge.",
      "We assume customers arrive knowing what they want rather than designing for discovery and guidance.",
      "We assume customers can find what they are looking for without designing for the full range of search behaviours.",
      "We do not design for the four distinct customer types we serve: Spontaneous, Competitive, Humanistic and Methodical.",
      "We treat the homepage as the primary entry point when the majority of our traffic lands on category or product pages."
    ]
  },
  {
    id: 5,
    name: "Channel Dependency",
    premise: "Businesses that mistake reach for resilience.",
    color: "#1a7a8f",
    items: [
      "We are over-reliant on a single marketplace or channel with no defensible alternative if that channel changes its terms.",
      "We expect brand equity and premium positioning to drive marketplace performance, rather than breadth of range and competitive pricing.",
      "Our acquisition investment is so dominant that we have not built meaningful retention infrastructure or owned audience, creating a business that cannot grow profitably without increasing paid spend.",
      "We do not have a deliberate channel diversification strategy built and tested before we need it."
    ]
  },
  {
    id: 6,
    name: "Channel Fragmentation",
    premise: "Treating channels as separate businesses rather than touchpoints in a single customer experience.",
    color: "#c0392b",
    items: [
      "We measure channel performance independently rather than tracking the full customer journey across touchpoints.",
      "We manage channels as separate commercial entities with competing objectives and budgets rather than shared goals.",
      "We allocate investment based on last-click attribution rather than the contribution of each touchpoint to the eventual decision, systematically underfunding the channels that start journeys and overfunding the ones that merely close them.",
      "We treat physical and digital retail as competing alternatives rather than complementary parts of one customer experience."
    ]
  },
  {
    id: 7,
    name: "Localisation Failure",
    premise: "Businesses that treat international as a copy-paste of domestic.",
    color: "#c9a84c",
    items: [
      "International demand for our products exists but is unserved or frustrated by infrastructure built for our domestic market.",
      "We have not localised language, payment methods, product assortment or seasonal relevance for our international markets.",
      "We apply the same product mix and trading calendar to international markets regardless of cultural or seasonal differences.",
      "We apply domestic data standards, operational processes and infrastructure unchanged to our international markets."
    ]
  }
];

const SEVERITY = [
  { value: 1, label: "Limited impact", desc: "Present but contained", color: "#e8a020" },
  { value: 2, label: "Material impact", desc: "Measurably affecting performance", color: "#d06020" },
  { value: 3, label: "Destroying value", desc: "Actively eroding margin and growth", color: "#b54a1a" }
];

function getClusterScore(clusterId, answers) {
  const cluster = CLUSTERS.find(c => c.id === clusterId);
  const maxScore = cluster.items.length * 3;
  let score = 0;
  cluster.items.forEach((_, idx) => {
    const key = `${clusterId}-${idx}`;
    const ans = answers[key];
    if (ans && ans.present) {
      score += ans.severity || 1;
    }
  });
  return { score, maxScore, pct: Math.round((score / maxScore) * 100) };
}

function getOverallRating(answers) {
  let totalScore = 0;
  let totalMax = 0;
  let criticalClusters = 0;

  CLUSTERS.forEach(cluster => {
    const { score, maxScore, pct } = getClusterScore(cluster.id, answers);
    totalScore += score;
    totalMax += maxScore;
    if (pct >= 60) criticalClusters++;
  });

  const overallPct = Math.round((totalScore / totalMax) * 100);

  // Check for any critical severity items
  const hasCriticalItems = Object.values(answers).some(a => a.present && a.severity === 3);
  const criticalCount = Object.values(answers).filter(a => a.present && a.severity === 3).length;

  if (overallPct <= 20 && criticalClusters === 0 && criticalCount === 0) {
    return "FOUNDATION_READY";
  } else if (overallPct >= 45 || criticalClusters >= 3 || criticalCount >= 5) {
    return "NOT_FIT";
  } else {
    return "AT_RISK";
  }
}

function getPriorities(answers) {
  const priorities = [];
  CLUSTERS.forEach(cluster => {
    cluster.items.forEach((item, idx) => {
      const key = `${cluster.id}-${idx}`;
      const ans = answers[key];
      if (ans && ans.present) {
        priorities.push({
          cluster: cluster.name,
          clusterColor: cluster.color,
          item,
          severity: ans.severity || 1,
          key
        });
      }
    });
  });
  return priorities.sort((a, b) => b.severity - a.severity);
}

function getTotalAnswered(answers) {
  let yes = 0, no = 0;
  CLUSTERS.forEach(cluster => {
    cluster.items.forEach((_, idx) => {
      const key = `${cluster.id}-${idx}`;
      const ans = answers[key];
      if (ans) {
        if (ans.present) yes++;
        else no++;
      }
    });
  });
  return { yes, no, total: yes + no };
}

function getTotalItems() {
  return CLUSTERS.reduce((sum, c) => sum + c.items.length, 0);
}

// ── COMPONENTS ──

function Header({ stage }) {

    <div style={{
      background: 'var(--navy)',
      padding: '40px 48px 36px',
      position: 'relative',
      overflow: 'hidden'

      <div style={{
        position: 'absolute', top: 0, right: 0,
        width: 400, height: '100%',
        background: 'linear-gradient(135deg, transparent 40%, rgba(201,168,76,0.05) 100%)'
      }}/>
      <div style={{
        fontSize: 10, fontFamily: "'Barlow Condensed', sans-serif",
        fontWeight: 700, letterSpacing: '0.22em', textTransform: 'uppercase',
        color: 'var(--gold)', marginBottom: 16
      }}>
        Digital Commerce Diagnostic Framework
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 32 }}>
        <div>
          <div style={{
            fontFamily: "'Cormorant Garamond', serif",
            fontSize: 64, fontWeight: 300, color: 'white',
            lineHeight: 0.9, letterSpacing: '-0.02em'
          }}>
            Fit to <span style={{ color: 'var(--gold)', fontStyle: 'italic' }}>Trade</span>
          </div>
          <div style={{
            fontSize: 13, color: 'rgba(255,255,255,0.5)',
            fontWeight: 300, marginTop: 12, letterSpacing: '0.05em'
          }}>
            Self-Assessment · Foundation First
          </div>
        </div>
        {stage === 'assessment' && (
          <div style={{
            textAlign: 'right',
            borderRight: '2px solid var(--gold)',
            paddingRight: 20
          }}>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 6 }}>
              Framework
            </div>
            <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 20, color: 'var(--gold-light)', fontStyle: 'italic' }}>
              7 clusters<br/>36 failure modes
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function ProgressBar({ answers }) {
  const total = getTotalItems();
  const { total: answered } = getTotalAnswered(answers);
  const pct = Math.round((answered / total) * 100);
  return (
    <div style={{ background: 'var(--navy-mid)', padding: '12px 48px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
        <div style={{ flex: 1, height: 3, background: 'rgba(255,255,255,0.1)', borderRadius: 2, overflow: 'hidden' }}>
          <div style={{
            height: '100%', background: 'var(--gold)',
            width: `${pct}%`, transition: 'width 0.4s ease'
          }}/>
        </div>
        <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', whiteSpace: 'nowrap', fontWeight: 500 }}>
          {answered} of {total} completed
        </div>
      </div>
    </div>
  );
}

function Intro({ onStart }) {
  return (
    <div style={{ maxWidth: 760, margin: '0 auto', padding: '60px 48px' }}>
      <div style={{
        fontFamily: "'Cormorant Garamond', serif",
        fontSize: 11, color: 'var(--gold)', fontWeight: 400,
        letterSpacing: '0.18em', textTransform: 'uppercase', marginBottom: 24
      }}>
        Before You Begin
      </div>
      <div style={{
        fontFamily: "'Cormorant Garamond', serif",
        fontSize: 32, fontWeight: 300, color: 'var(--text-dark)',
        lineHeight: 1.3, marginBottom: 32
      }}>
        Foundation Ready looks like a business that has earned the right to invest in growth.
      </div>
      <div style={{ fontSize: 14, color: 'var(--text-mid)', lineHeight: 1.8, marginBottom: 32 }}>
        This assessment works through 36 failure modes across 7 clusters. For each one, answer honestly whether it is present in your business. Where it is, rate the severity. The output will tell you where you stand, what your priorities are, and what to address first.
      </div>
      <div style={{
        fontSize: 12, color: 'var(--text-light)', fontStyle: 'italic',
        borderLeft: '2px solid var(--gold)', paddingLeft: 16, marginBottom: 32, lineHeight: 1.7
      }}>
        This assessment is designed for owners, CEOs and senior commercial leaders. It is not an operational checklist. The questions are deliberately direct — they are written for people who have full visibility of how the business actually performs, not how it is intended to perform.
      </div>
      <div style={{
        background: 'var(--white)', border: '1px solid var(--rule)',
        padding: '28px 32px', marginBottom: 40
      }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24 }}>
          {[
            { step: 'Step 1', title: 'Yes or No', desc: 'Is this failure mode present in your business? Answer instinctively.' },
            { step: 'Step 2', title: 'Severity', desc: 'If yes, rate it: Limited impact, Material impact, or Destroying value.' },
            { step: 'Step 3', title: 'Your Rating', desc: 'Receive your Fit to Trade rating, cluster scores and priorities.' }
          ].map((s, i) => (
            <div key={i}>
              <div style={{ fontSize: 10, color: 'var(--gold)', letterSpacing: '0.15em', textTransform: 'uppercase', fontWeight: 700, marginBottom: 6 }}>{s.step}</div>
              <div style={{ fontSize: 15, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8, color: 'var(--text-dark)' }}>{s.title}</div>
              <div style={{ fontSize: 12, color: 'var(--text-mid)', lineHeight: 1.6 }}>{s.desc}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ fontSize: 13, color: 'var(--text-light)', fontStyle: 'italic', marginBottom: 40, lineHeight: 1.7 }}>
        This assessment takes 30 to 60 minutes. The instinctive answer to each question is almost always the accurate one. Resist the urge to qualify.
      </div>
      <button onClick={onStart} style={{
        background: 'var(--navy)', color: 'white',
        border: 'none', padding: '16px 48px',
        fontFamily: "'Barlow Condensed', sans-serif",
        fontSize: 13, fontWeight: 700,
        letterSpacing: '0.15em', textTransform: 'uppercase',
        cursor: 'pointer'
      }}>
        Begin Assessment
      </button>
    </div>
  );
}

function ClusterSection({ cluster, answers, onAnswer, isActive, onActivate }) {
  const { score, maxScore, pct } = getClusterScore(cluster.id, answers);
  const answeredCount = cluster.items.filter((_, idx) => answers[`${cluster.id}-${idx}`]).length;
  const complete = answeredCount === cluster.items.length;

  return (
    <div style={{
      background: 'var(--white)',
      borderLeft: `3px solid ${cluster.color}`,
      marginBottom: 3
    }}>
      <div
        onClick={onActivate}
        style={{
          padding: '20px 28px',
          display: 'flex', alignItems: 'center',
          justifyContent: 'space-between', gap: 16,
          cursor: 'pointer',
          background: isActive ? 'rgba(0,0,0,0.02)' : 'transparent'
        }}
      >
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, flex: 1 }}>
          <div style={{
            fontFamily: "'Cormorant Garamond', serif",
            fontSize: 13, color: cluster.color, fontStyle: 'italic',
            minWidth: 64
          }}>
            Cluster {cluster.id < 10 ? `0${cluster.id}` : cluster.id}
          </div>
          <div>
            <div style={{
              fontFamily: "'Barlow Condensed', sans-serif",
              fontSize: 16, fontWeight: 700,
              textTransform: 'uppercase', letterSpacing: '0.05em',
              color: 'var(--text-dark)'
            }}>
              {cluster.name}
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-light)', marginTop: 2 }}>
              {cluster.items.length} failure modes
            </div>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
          {complete && (
            <div style={{
              fontSize: 10, fontWeight: 700, letterSpacing: '0.15em',
              textTransform: 'uppercase', color: cluster.color,
              background: `${cluster.color}15`,
              padding: '4px 10px'
            }}>
              Complete
            </div>
          )}
          {!complete && answeredCount > 0 && (
            <div style={{ fontSize: 11, color: 'var(--text-light)' }}>
              {answeredCount}/{cluster.items.length}
            </div>
          )}
          <div style={{
            fontSize: 18, color: 'var(--text-light)',
            transform: isActive ? 'rotate(180deg)' : 'none',
            transition: 'transform 0.2s ease'
          }}>
            ›
          </div>
        </div>
      </div>

      {isActive && (
        <div style={{ padding: '8px 28px 28px' }}>
          <div style={{
            fontSize: 12, color: 'var(--text-light)', fontStyle: 'italic',
            marginBottom: 24, paddingBottom: 20,
            borderBottom: '1px solid var(--rule)', lineHeight: 1.6
          }}>
            {cluster.premise}
          </div>
          {cluster.items.map((item, idx) => {
            const key = `${cluster.id}-${idx}`;
            const ans = answers[key];
            return (
              <FailureModeRow
                key={key}
                item={item}
                idx={idx}
                answer={ans}
                clusterColor={cluster.color}
                onAnswer={(present, severity) => onAnswer(key, present, severity)}
              />
            );
          })}
        </div>
      )}
    </div>
  );
}

function FailureModeRow({ item, idx, answer, clusterColor, onAnswer }) {
  return (
    <div style={{
      padding: '16px 0',
      borderBottom: '1px solid var(--rule)',
      display: 'grid',
      gridTemplateColumns: '1fr auto',
      gap: 24, alignItems: 'start'
    }}>
      <div>
        <div style={{ fontSize: 12, color: 'var(--text-mid)', lineHeight: 1.7 }}>
          {item}
        </div>
        {answer && answer.present && (
          <div style={{ display: 'flex', gap: 8, marginTop: 12, flexWrap: 'wrap' }}>
            {SEVERITY.map(s => (
              <button
                key={s.value}
                onClick={() => onAnswer(true, s.value)}
                style={{
                  padding: '5px 14px',
                  fontFamily: "'Barlow Condensed', sans-serif",
                  fontSize: 11, fontWeight: 700,
                  letterSpacing: '0.12em', textTransform: 'uppercase',
                  border: answer.severity === s.value ? 'none' : '1px solid var(--rule)',
                  background: answer.severity === s.value ? s.color : 'transparent',
                  color: answer.severity === s.value ? 'white' : 'var(--text-light)',
                  cursor: 'pointer'
                }}
              >
                {s.label}
              </button>
            ))}
            <div style={{ fontSize: 11, color: 'var(--text-light)', alignSelf: 'center', marginLeft: 4, fontStyle: 'italic' }}>
              {answer.severity ? SEVERITY.find(s => s.value === answer.severity)?.desc : 'Select severity'}
            </div>
          </div>
        )}
      </div>
      <div style={{ display: 'flex', gap: 8, paddingTop: 2 }}>
        <button
          onClick={() => onAnswer(true, answer?.severity || 1)}
          style={{
            width: 48, height: 32,
            fontFamily: "'Barlow Condensed', sans-serif",
            fontSize: 11, fontWeight: 700, letterSpacing: '0.1em',
            border: 'none', cursor: 'pointer',
            background: answer?.present === true ? clusterColor : 'var(--rule)',
            color: answer?.present === true ? 'white' : 'var(--text-light)'
          }}
        >
          YES
        </button>
        <button
          onClick={() => onAnswer(false, null)}
          style={{
            width: 48, height: 32,
            fontFamily: "'Barlow Condensed', sans-serif",
            fontSize: 11, fontWeight: 700, letterSpacing: '0.1em',
            border: 'none', cursor: 'pointer',
            background: answer?.present === false ? '#2d7a4a' : 'var(--rule)',
            color: answer?.present === false ? 'white' : 'var(--text-light)'
          }}
        >
          NO
        </button>
      </div>
    </div>
  );
}

function Results({ answers, onRetake }) {
  const rating = getOverallRating(answers);
  const priorities = getPriorities(answers);
  const { yes, no } = getTotalAnswered(answers);

  React.useEffect(() => {
    if (window.gtag) {
      window.gtag('event', 'assessment_complete', {
        event_category: 'engagement',
        event_label: rating,
      });
    }
  }, []);

  const ratings = {
    FOUNDATION_READY: {
      label: 'Foundation Ready',
      sub: 'Your foundations are secure. Invest with confidence.',
      desc: 'Your operational and strategic foundations are in strong shape. External investment in platforms, acquisition and channel expansion is well-positioned to generate returns. The priority now is optimisation, scale and the continuous discipline of reviewing these foundations as the business grows.',
      bg: 'var(--green-pale)',
      color: 'var(--green)',
      badge: '#2d7a4a'
    },
    AT_RISK: {
      label: 'At Risk',
      sub: 'Meaningful gaps present. Prioritise before scaling.',
      desc: 'Failure modes have been identified across one or more clusters that will limit the returns on further external investment. Continuing to scale without addressing these will generate diminishing returns and compound existing problems. Work through the prioritised list below before resuming significant growth investment.',
      bg: 'var(--amber-pale)',
      color: '#7a5a10',
      badge: 'var(--amber)'
    },
    NOT_FIT: {
      label: 'Not Fit to Trade',
      sub: 'Value destruction confirmed. Stop and rebuild.',
      desc: 'Failure modes that are actively destroying value exist across multiple clusters. In this condition, external investment is likely to accelerate loss rather than create return. A structured foundation programme is required before any material growth activity resumes. The prioritised list below is your starting point.',
      bg: 'var(--red-pale)',
      color: '#7a2010',
      badge: 'var(--red)'
    }
  };

  const r = ratings[rating];

  return (
    <div style={{ maxWidth: 900, margin: '0 auto', padding: '52px 48px' }}>

      {/* Rating card */}
      <div style={{ background: r.bg, padding: '40px 48px', marginBottom: 3 }}>
        <div style={{
          display: 'inline-block',
          background: r.badge, color: 'white',
          fontSize: 9, fontWeight: 700, letterSpacing: '0.2em',
          textTransform: 'uppercase', padding: '5px 14px', marginBottom: 20
        }}>
          Your Rating
        </div>
        <div style={{
          fontFamily: "'Cormorant Garamond', serif",
          fontSize: 44, fontWeight: 600, color: r.color,
          lineHeight: 1.1, marginBottom: 12
        }}>
          {r.label}
        </div>
        <div style={{
          fontFamily: "'Cormorant Garamond', serif",
          fontSize: 20, fontStyle: 'italic', color: r.color,
          marginBottom: 20, opacity: 0.8
        }}>
          {r.sub}
        </div>
        <div style={{ fontSize: 14, color: 'var(--text-mid)', lineHeight: 1.8, maxWidth: 640 }}>
          {r.desc}
        </div>
      </div>

      {/* Tension paragraph */}
      <div style={{
        background: 'var(--navy)', padding: '20px 32px',
        marginBottom: 3
      }}>
        <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.75)', lineHeight: 1.9, maxWidth: 680 }}>
          This assessment identifies symptoms. It does not identify root causes, quantify financial impact, or reveal the structural issues that typically sit beneath the surface patterns. In our experience, most businesses showing these patterns are losing significant profit without fully understanding why. The failure modes flagged here are rarely isolated — they compound, and the cost is usually larger than it first appears. The instinctive response is to address the visible symptoms. The more valuable step is to understand what is driving them.
        </div>
      </div>

      {/* Summary stats */}
      <div style={{
        background: 'var(--white)', padding: '24px 32px',
        display: 'grid', gridTemplateColumns: 'repeat(4,1fr)',
        gap: 24, marginBottom: 3, borderBottom: '1px solid var(--rule)'
      }}>
        {[
          { n: yes, label: 'Failure modes present' },
          { n: no, label: 'Areas confirmed strong' },
          { n: priorities.filter(p => p.severity === 3).length, label: 'Value destroying' },
          { n: priorities.filter(p => p.severity === 2).length, label: 'Material impact' }
        ].map((s, i) => (
          <div key={i} style={{ textAlign: 'center' }}>
            <div style={{
              fontFamily: "'Cormorant Garamond', serif",
              fontSize: 44, fontWeight: 600, color: 'var(--navy)', lineHeight: 1
            }}>
              {s.n}
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-light)', textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 600, marginTop: 4 }}>
              {s.label}
            </div>
          </div>
        ))}
      </div>

      {/* Cluster breakdown */}
      <div style={{ background: 'var(--white)', padding: '28px 32px', marginBottom: 3 }}>
        <div style={{
          fontSize: 10, fontWeight: 700, letterSpacing: '0.2em',
          textTransform: 'uppercase', color: 'var(--text-light)', marginBottom: 20
        }}>
          Cluster Breakdown
        </div>
        {CLUSTERS.map(cluster => {
          const { pct } = getClusterScore(cluster.id, answers);
          const present = cluster.items.filter((_, idx) => answers[`${cluster.id}-${idx}`]?.present).length;
          return (
            <div key={cluster.id} style={{ marginBottom: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, alignItems: 'baseline' }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-dark)' }}>
                  {cluster.name}
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-light)' }}>
                  {present} of {cluster.items.length} present
                </div>
              </div>
              <div style={{ height: 6, background: 'var(--rule)', borderRadius: 3, overflow: 'hidden' }}>
                <div style={{
                  height: '100%',
                  width: `${pct}%`,
                  background: pct >= 60 ? 'var(--red)' : pct >= 30 ? 'var(--amber)' : 'var(--green)',
                  transition: 'width 0.6s ease'
                }}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* Priorities */}
      {priorities.length > 0 && (
        <div style={{ background: 'var(--white)', padding: '28px 32px', marginBottom: 3 }}>
          <div style={{
            fontSize: 10, fontWeight: 700, letterSpacing: '0.2em',
            textTransform: 'uppercase', color: 'var(--text-light)', marginBottom: 4
          }}>
            Prioritised Action List
          </div>
          <div style={{ fontSize: 12, color: 'var(--text-light)', fontStyle: 'italic', marginBottom: 20 }}>
            Ordered by severity. Address value-destroying items first, then material impact, then limited impact.
          </div>
          {priorities.map((p, i) => (
            <div key={i} style={{
              display: 'grid', gridTemplateColumns: 'auto 1fr auto',
              gap: 16, alignItems: 'start',
              padding: '14px 0',
              borderBottom: '1px solid var(--rule)'
            }}>
              <div style={{
                width: 28, height: 28,
                background: 'var(--navy)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: "'Cormorant Garamond', serif",
                fontSize: 14, color: 'var(--gold)', fontStyle: 'italic',
                flexShrink: 0, marginTop: 2
              }}>
                {i + 1}
              </div>
              <div>
                <div style={{ fontSize: 10, color: p.clusterColor, fontWeight: 700, letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 4 }}>
                  {p.cluster}
                </div>
                <div style={{ fontSize: 13, color: 'var(--text-mid)', lineHeight: 1.6 }}>
                  {p.item}
                </div>
              </div>
              <div style={{
                fontSize: 9, fontWeight: 700, letterSpacing: '0.15em',
                textTransform: 'uppercase', padding: '4px 10px',
                background: p.severity === 3 ? 'var(--red)' : p.severity === 2 ? '#e07030' : '#c9a84c',
                color: 'white', whiteSpace: 'nowrap', alignSelf: 'start'
              }}>
                {SEVERITY.find(s => s.value === p.severity)?.label}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Commercial Impact — shown only when relevant failure modes are flagged */}
      {(() => {
        const returnsPresent =
          answers['3-3']?.present || answers['3-4']?.present;
        const retentionPresent =
          answers['3-0']?.present || answers['5-2']?.present;
        const organicPresent =
          answers['5-2']?.present || answers['3-1']?.present;

        if (!returnsPresent && !retentionPresent && !organicPresent) return null;

        const items = [];

        if (returnsPresent) items.push({
          label: 'Returns management',
          color: '#b54a1a',
          impact: 'For a brand with £10M–£30M ecommerce revenue, each 1 percentage point reduction in return rate typically recovers £150K–£500K in net revenue, plus direct processing cost savings of £5–6 per avoided return (Loop 2025 State of Ecommerce Returns; Bain & Company). UK brands currently average a 17.5% return rate — the highest globally. Brands that have addressed returns infrastructure typically recover 5–8 percentage points, representing a material improvement in contribution margin.',
          source: 'Loop 2025 State of Ecommerce Returns Report (13.8M returns, 4,000+ merchants); Bain & Company reverse logistics analysis'
        });

        if (retentionPresent) items.push({
          label: 'Customer retention and lifecycle',
          color: '#2a5c9e',
          impact: 'A 5% improvement in customer retention can boost profits by 25–95% without additional acquisition spend (Bain & Company). The average ecommerce brand loses 70–77% of customers each year. Brands with structured lifecycle automation typically see 15–30% uplift in revenue per customer. For a brand with 50,000 active customers at £150 average annual value, a 5pp retention improvement represents approximately £375K in additional recurring revenue — before accounting for the compounding effect over multiple years.',
          source: 'Bain & Company customer retention research; Klaviyo 2024 benchmark report (325 billion emails analysed); Envive 2025 retention statistics'
        });

        if (organicPresent) items.push({
          label: 'Organic acquisition dependency',
          color: '#1a7a8f',
          impact: 'Organic search generates leads at approximately £31 per lead versus £181 for paid search — 5.8x more cost-effective per lead (HubSpot, cited FirstPageSage 2025). For a brand spending 25–35% of revenue on paid acquisition, each 10 percentage point shift from paid to organic typically saves £250K–£500K per £10M of ecommerce revenue. Organic traffic also converts at 14.6% versus 1.7% for outbound channels, meaning the quality of traffic improves alongside the cost reduction.',
          source: 'HubSpot CAC benchmark data (organic £31/lead vs paid £181/lead); FirstPageSage 2025 SEO ROI report; SEOProfy 2026 organic conversion benchmarks'
        });

        return (
          <div style={{ background: 'var(--white)', padding: '28px 32px', marginBottom: 3 }}>
            <div style={{
              fontSize: 10, fontWeight: 700, letterSpacing: '0.2em',
              textTransform: 'uppercase', color: 'var(--text-light)', marginBottom: 4
            }}>
              Commercial Implications
            </div>
            <div style={{ fontSize: 12, color: 'var(--text-light)', fontStyle: 'italic', marginBottom: 24 }}>
              Industry research on the revenue impact of the failure modes identified in your assessment.
            </div>
            {items.map((item, i) => (
              <div key={i} style={{
                borderLeft: `3px solid ${item.color}`,
                paddingLeft: 20, marginBottom: i < items.length - 1 ? 28 : 0
              }}>
                <div style={{
                  fontSize: 11, fontWeight: 700, letterSpacing: '0.12em',
                  textTransform: 'uppercase', color: item.color, marginBottom: 10
                }}>
                  {item.label}
                </div>
                <div style={{ fontSize: 13, color: 'var(--text-mid)', lineHeight: 1.8, marginBottom: 8 }}>
                  {item.impact}
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-light)', fontStyle: 'italic' }}>
                  Source: {item.source}
                </div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* CTA */}
      <div style={{
        background: 'var(--navy)', padding: '36px 40px',
        display: 'grid', gridTemplateColumns: '1fr auto',
        gap: 32, alignItems: 'center'
      }}>
        <div>
          <div style={{
            fontSize: 10, fontWeight: 700, letterSpacing: '0.2em',
            textTransform: 'uppercase', color: 'var(--gold)', marginBottom: 10
          }}>
            The Next Step
          </div>
          <div style={{
            fontFamily: "'Cormorant Garamond', serif",
            fontSize: 20, fontStyle: 'italic', color: 'white',
            lineHeight: 1.5, marginBottom: 12
          }}>
            The next step is a structured diagnostic — to identify root causes, quantify what the failure modes are costing, and produce a sequenced intervention plan.
          </div>
          <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.5)', lineHeight: 1.7 }}>
            The diagnostic is a structured conversation that pressure-tests your self-assessment, identifies what the failures are actually costing you, and produces a prioritised plan with clear sequencing. Not a report. A working document.
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, alignItems: 'flex-end' }}>
          <button
            onClick={() => {
              if (window.gtag) window.gtag('event', 'click', { event_category: 'cta', event_label: 'request_diagnostic_results' });
              window.location.href = 'mailto:scawebster@gmail.com?subject=Fit%20to%20Trade%20Diagnostic%20Request&body=Hi%20Steve%2C%0A%0AI%20have%20just%20completed%20the%20Fit%20to%20Trade%20self-assessment%20and%20would%20like%20to%20discuss%20a%20deeper%20diagnostic.%0A%0AMy%20results%3A%0A%0A';
            }}
            style={{
            background: 'var(--gold)', color: 'var(--navy)',
            border: 'none', padding: '14px 28px',
            fontFamily: "'Barlow Condensed', sans-serif",
            fontSize: 11, fontWeight: 700, letterSpacing: '0.15em',
            textTransform: 'uppercase', cursor: 'pointer', whiteSpace: 'nowrap'
          }}>
            Begin the Diagnostic
          </button>
          <button
            onClick={() => {
              if (window.gtag) window.gtag('event', 'click', { event_category: 'engagement', event_label: 'retake_assessment' });
              onRetake();
            }}
            style={{
              background: 'transparent',
              color: 'rgba(255,255,255,0.5)',
              border: '1px solid rgba(255,255,255,0.2)',
              padding: '14px 28px',
              fontFamily: "'Barlow Condensed', sans-serif",
              fontSize: 11, fontWeight: 700, letterSpacing: '0.15em',
              textTransform: 'uppercase', cursor: 'pointer', whiteSpace: 'nowrap'
            }}
          >
            Retake Assessment
          </button>
        </div>
      </div>

      {/* Footer */}
      <div style={{
        paddingTop: 28, display: 'flex',
        justifyContent: 'space-between', alignItems: 'center'
      }}>
        <div>
          <div style={{
            fontFamily: "'Cormorant Garamond', serif",
            fontSize: 15, fontWeight: 600, color: 'var(--text-dark)'
          }}>
            Steve Webster · <span style={{ color: 'var(--gold)', fontStyle: 'italic' }}>Fit to Trade</span>
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-light)', marginTop: 3, letterSpacing: '0.08em' }}>
            Foundation First · Digital Commerce Diagnostic Framework
          </div>
        </div>
        <div style={{ fontSize: 11, color: 'var(--text-light)', textAlign: 'right' }}>
          Two decades of digital commerce leadership<br/>
          across PLC, PE-backed and founder-led businesses
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──

function App() {
  const [stage, setStage] = React.useState('intro'); // intro | assessment | results
  const [answers, setAnswers] = React.useState({});
  const [activeCluster, setActiveCluster] = React.useState(1);

  const totalItems = getTotalItems();
  const { total: answered } = getTotalAnswered(answers);
  const allAnswered = answered === totalItems;

  function handleAnswer(key, present, severity) {
    setAnswers(prev => ({
      ...prev,
      [key]: { present, severity: present ? (severity || 1) : null }
    }));
  }

  function handleRetake() {
    setAnswers({});
    setActiveCluster(1);
    setStage('intro');
  }

  return (
    <div style={{ minHeight: '100vh' }}>
      <Header stage={stage} />
      {stage === 'assessment' && <ProgressBar answers={answers} />}

      {stage === 'intro' && (
        <Intro onStart={() => setStage('assessment')} />
      )}

      {stage === 'assessment' && (
        <div style={{ maxWidth: 900, margin: '0 auto', padding: '40px 48px' }}>
          {CLUSTERS.map(cluster => (
            <ClusterSection
              key={cluster.id}
              cluster={cluster}
              answers={answers}
              onAnswer={handleAnswer}
              isActive={activeCluster === cluster.id}
              onActivate={() => setActiveCluster(activeCluster === cluster.id ? null : cluster.id)}
            />
          ))}

          <div style={{ marginTop: 32, display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 16 }}>
            {!allAnswered && (
              <div style={{ fontSize: 12, color: 'var(--text-light)', fontStyle: 'italic' }}>
                {totalItems - answered} questions remaining
              </div>
            )}
            <button
              onClick={() => allAnswered && setStage('results')}
              style={{
                background: allAnswered ? 'var(--navy)' : 'var(--rule)',
                color: allAnswered ? 'white' : 'var(--text-light)',
                border: 'none', padding: '16px 48px',
                fontFamily: "'Barlow Condensed', sans-serif",
                fontSize: 13, fontWeight: 700,
                letterSpacing: '0.15em', textTransform: 'uppercase',
                cursor: allAnswered ? 'pointer' : 'not-allowed',
                transition: 'all 0.2s ease'
              }}
            >
              {allAnswered ? 'See My Results' : `Complete All Questions to Continue`}
            </button>
          </div>
        </div>
      )}

      {stage === 'results' && (
        <Results answers={answers} onRetake={handleRetake} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
